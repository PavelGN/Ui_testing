name: Python autotest

on: 
  workflow_dispatch:
    inputs:
      deployment_target:
        description: choose tests set
        required: true
        type: choice
        default: smoke
        options:
          - smoke
          - regression
          - extended
          - all

jobs:
  run-tests:
    runs-on: ubuntu-latest
    name: Run autotest
    steps:
     - name: Checkout autotests
       uses: actions/checkout@v6
     - name: Set up Python environment
       uses: actions/setup-python@v6
       with:
         python-version: '3.13'
     - name: Install dependencies   
       run: pip install -r requirements.txt
     - name: run tests
       run: pytest
