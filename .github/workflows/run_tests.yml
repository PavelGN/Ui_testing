name: Python autotest

on: 
  workflow_dispatch:
    inputs:
      deployment_target:
        description: choose tests set
        required: true
        type: choice
        default: smoke
        options:
          - smoke
          - regression
          - extended
          - all

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    name: Run autotest
    steps:
     - name: Checkout autotests
       uses: actions/checkout@v6
     - name: Set up Python environment
       uses: actions/setup-python@v6
       with:
         python-version: '3.13'
     - name: Install dependencies   
       run: pip install -r requirements.txt
     - name: run all tests
       if: ${{ github.event.inputs.deployment_target == 'all' }}
       run: pytest --alluredir=allure-results
       continue-on-error: true
     - name: run smoke tests
       if: ${{ github.event.inputs.deployment_target == 'smoke' }}
       run: pytest -m smoke --alluredir=allure-results
       continue-on-error: true
     - name: run regression tests
       if: ${{ github.event.inputs.deployment_target == 'regression' }}
       run: pytest -m regression --alluredir=allure-results
       continue-on-error: true
     - name: run extended tests
       if: ${{ github.event.inputs.deployment_target == 'extended' }}
       run: pytest -m extended --alluredir=allure-results
       continue-on-error: true
     - name: Install Java
       uses: actions/setup-java@v5
       with:
        distribution: 'microsoft' # See 'Supported distributions' for available options
        java-version: '25'
     - name: Install Allure
       run: | 
         wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.37.0.tgz
         tar -zxvf allure-2.37.0.tgz
         sudo mv allure-2.37.0 /opt/allure
         sudo ln -s /opt/allure/bin/allure /usr/bin/allure
     - name: Generate report
       run: allure generate -c allure-results -o _site
     - name: Save allure report
       uses: actions/upload-artifact@v4
       with:
         name: _site
         path: _site
         retention-days: 1
         
  publish-report:
    name: Report publication
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: _site
          path: _site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
